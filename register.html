<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Register</title>
        <style>
            html {
                font-size: 25px;
                font-family: 'Times New Roman', Times, serif;
            }
            body {
                background-color: #333;
                margin: 0;
                padding: 0;
                background-image: url("html6.jpeg");
                background-size: cover;
            }
        </style>
    </head>
    <body>
        <h1 style="color: rgb(234, 238, 10); text-align: center; font-size: 32px; font-family: 'Times New Roman', Times, serif;">Register</h1>
        <div id="message"></div>
        <form onsubmit="handleRegister(event)" style="text-align: center;">
            <label for="username" style="color: rgb(234, 238, 10);">Username:</label><br>
            <input type="text" id="username" name="username" required><br><br>
            <label for="email" style="color: rgb(234, 238, 10);">Email:</label><br>
            <input type="email" id="email" name="email" required><br><br>
            <label for="password" style="color: rgb(234, 238, 10);">Password:</label><br>
            <input type="password" id="password" name="password" required><br><br>
            <input type="submit" value="Register">
        </form>
        <p style="color: rgb(234, 238, 10); text-align: center;">
            Already have an account? <a href="login.html">Login here</a>
        </p>
        <script src="auth.js"></script>
    </body>
</html>
